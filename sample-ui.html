<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI 샘플 — 봄 테마</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#FBF8F3;--cream:#F5EFE4;
  --gold:#B8975A;--gold-lt:#D4B47A;--gold-dk:#8B6E3A;
  --sage:#8BAF7C;--sage-lt:#A8D49A;--sage-dk:#5A8A4E;
  --blush:#F2C4CE;--sky:#A8D4E0;--peach:#F5C4A0;
  --charcoal:#2C2C2C;--stone:#6B6560;--stone-lt:#A09890;--border:#E8DDD0;
  --white:#FFFFFF;--success:#5A9E7A;--error:#C45050;
  --radius:16px;--radius-sm:10px;
  --tr:0.28s cubic-bezier(.4,0,.2,1);
  --sh-sm:0 2px 12px rgba(44,44,44,.06);--sh-md:0 8px 40px rgba(44,44,44,.10);
}
html{scroll-behavior:smooth}
body{background:var(--ivory);color:var(--charcoal);font-family:'Noto Sans KR',sans-serif;
  font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── 배경 오브 ── */
.bg-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.38}
.bg-orb-1{width:520px;height:520px;top:-100px;left:-120px;
  background:radial-gradient(circle,#F2C4CE,#F5C4A0);
  animation:orbFloat1 14s ease-in-out infinite}
.bg-orb-2{width:420px;height:420px;bottom:-80px;right:-100px;
  background:radial-gradient(circle,#A8D4E0,#8BAF7C);
  animation:orbFloat2 18s ease-in-out infinite}
.bg-orb-3{width:300px;height:300px;top:40%;left:55%;
  background:radial-gradient(circle,#F5EFD0,#F2C4CE 70%);
  animation:orbFloat3 22s ease-in-out infinite}
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.08)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-40px) scale(1.1)}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-20px,20px) scale(.95)}66%{transform:translate(20px,-15px) scale(1.05)}}

/* ── 꽃잎 파티클 ── */
.petals-wrap{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.petal{position:absolute;top:-20px;opacity:0;border-radius:50% 50% 50% 0/60% 60% 40% 40%;
  animation:petalFall linear infinite}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(0) rotate(0deg)}
  8%{opacity:.65} 88%{opacity:.4}
  100%{opacity:0;transform:translateY(105vh) rotate(540deg)}
}

/* ── 탭 ── */
.tab-bar{position:sticky;top:0;z-index:100;background:rgba(251,248,243,.96);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  display:flex;justify-content:center;padding:0 20px}
.tab-btn{flex:1;max-width:160px;padding:16px 8px;background:none;border:none;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:.82rem;font-weight:400;
  color:var(--stone-lt);letter-spacing:.1em;border-bottom:2px solid transparent;transition:all var(--tr)}
.tab-btn.active{color:var(--sage-dk);border-bottom-color:var(--sage);font-weight:500}

.page{display:block;max-width:640px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:2}

/* ── 헤더 ── */
.site-header{text-align:center;padding:40px 0 28px;position:relative;overflow:hidden}

/* 헤더 배경 씬 */
.header-scene{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hs-hill{position:absolute;border-radius:50%;bottom:-40px}
.hs-hill-1{width:600px;height:200px;left:50%;transform:translateX(-50%);
  background:linear-gradient(170deg,rgba(168,212,160,.2),rgba(139,175,124,.13))}
.hs-hill-2{width:380px;height:140px;left:50%;transform:translateX(-50%);
  background:linear-gradient(170deg,rgba(185,228,175,.15),rgba(140,190,125,.1))}
.hs-church{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);opacity:.1}
.hs-church svg{width:72px}
.hs-cloud{position:absolute;border-radius:40px;background:white;
  animation:cloudDrift ease-in-out infinite alternate}
@keyframes cloudDrift{0%{transform:translateX(-8px)}100%{transform:translateX(8px)}}
.hs-spark{position:absolute;width:5px;height:5px;border-radius:50%;
  animation:sparkPulse ease-in-out infinite}
@keyframes sparkPulse{0%,100%{opacity:0;transform:scale(.2)}50%{opacity:.75;transform:scale(1)}}

/* 로고 아이콘 (첫 번째 샘플) */
.logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:68px;height:68px;border-radius:20px;
  background:linear-gradient(145deg,#fff,#F5EFE4);
  box-shadow:0 4px 24px rgba(184,151,90,.18),0 1px 4px rgba(184,151,90,.1);
  margin-bottom:18px;position:relative;
  animation:logoFloat 5s ease-in-out infinite;
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-cross{width:32px;height:32px;position:relative}
.logo-cross::before{content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:9px;height:32px;border-radius:4px;
  background:linear-gradient(180deg,#EDD98A,#B8975A)}
.logo-cross::after{content:'';position:absolute;top:9px;left:0;
  width:32px;height:9px;border-radius:4px;
  background:linear-gradient(90deg,#B8975A,#EDD98A 50%,#B8975A)}
.logo-leaf{position:absolute;width:8px;height:8px;border-radius:50% 50% 50% 0}

/* 헤더 텍스트 (기존 구조 동일) */
.header-ornament{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px;opacity:.5}
.orn-line{height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold))}
.orn-line.r{background:linear-gradient(90deg,var(--gold),transparent)}
.church-name{font-family:'Cormorant Garamond',serif;font-weight:400;
  font-size:clamp(1.5rem,4vw,2rem);letter-spacing:.08em;margin-bottom:4px;color:#8B7355}
.dept-name{font-size:.76rem;letter-spacing:.25em;color:var(--gold);font-weight:500}
.theme-text{font-size:.72rem;color:var(--stone-lt);margin-top:8px;line-height:1.7;letter-spacing:.04em;font-weight:300}
.header-divider{width:48px;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0}

/* ── 기간 배지 ── */
.period-badge{display:flex;align-items:center;gap:8px;justify-content:center;
  margin:0 auto 20px;padding:8px 18px;
  background:rgba(139,175,124,.08);border:1px solid rgba(139,175,124,.28);
  border-radius:100px;width:fit-content}
.period-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.period-text{font-size:.75rem;color:var(--stone);letter-spacing:.06em}

/* ── 카드 (유리 효과) ── */
.card{background:rgba(255,255,255,.82);backdrop-filter:blur(16px);
  border-radius:var(--radius);border:1px solid rgba(255,255,255,.9);
  padding:24px 20px;margin-bottom:14px;
  box-shadow:0 4px 32px rgba(140,100,60,.07)}

/* ── Step 번호 (기존 구조, 봄 색상) ── */
.section-num{display:inline-flex;align-items:center;gap:12px;margin-bottom:18px}
.num-badge{width:26px;height:26px;border-radius:50%;
  background:linear-gradient(135deg,var(--sage-lt),var(--sage));
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:.88rem;color:white;flex-shrink:0}
.num-label{font-size:.8rem;letter-spacing:.12em;color:var(--stone);font-weight:400}

/* ── 인풋 (기존 구조) ── */
.field-group{position:relative;margin-bottom:8px}
.float-input{width:100%;padding:16px 18px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);background:rgba(251,248,243,.7);
  font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:400;
  color:var(--charcoal);outline:none;-webkit-appearance:none;
  transition:border-color var(--tr),background var(--tr)}
.float-input:focus{border-color:var(--sage);background:var(--white)}
select.float-input{color:var(--stone-lt);cursor:pointer}

/* ── 어린이 이름 (기존 구조 동일) ── */
.child-list-wrap{display:flex;flex-wrap:wrap;gap:8px;min-height:0}
.child-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:100px;border:1.5px solid var(--border);background:var(--cream);
  font-size:.82rem;color:var(--charcoal);cursor:pointer;transition:all var(--tr)}
.child-chip:hover{border-color:var(--sage-lt);background:rgba(139,175,124,.08);color:var(--sage-dk)}
.child-chip.active{border-color:var(--sage);background:rgba(139,175,124,.12);color:var(--sage-dk);font-weight:500}
.child-chip-del{width:16px;height:16px;border-radius:50%;background:var(--stone-lt);
  color:white;font-size:.55rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.child-chip-del:hover{background:var(--error)}
.child-add-row{display:flex;gap:8px;align-items:center}
.child-add-input{flex:1;padding:12px 16px;border:1.5px solid var(--border);
  border-radius:var(--radius-sm);background:rgba(251,248,243,.7);
  font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;color:var(--charcoal)}
.child-add-input:focus{border-color:var(--sage);background:var(--white)}
.child-add-btn{padding:12px 18px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--sage-lt),var(--sage));
  color:white;font-family:'Noto Sans KR',sans-serif;
  font-size:.82rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity var(--tr)}
.child-add-btn:hover{opacity:.85}
.child-empty{font-size:.75rem;color:var(--stone-lt);padding:4px 0}
.name-preview-wrap{display:flex;align-items:center;gap:10px;margin-top:12px}
.preview-label-text{font-size:.72rem;color:var(--stone-lt);letter-spacing:.1em;white-space:nowrap}
.name-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;
  border-radius:100px;background:rgba(139,175,124,.1);border:1px solid rgba(139,175,124,.3);
  font-size:.88rem;color:var(--sage-dk)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--sage);flex-shrink:0}

/* ── 업로드존 (기존 구조) ── */
.upload-zone{position:relative;border:2px dashed rgba(139,175,124,.35);border-radius:var(--radius);
  padding:32px 24px;text-align:center;cursor:pointer;transition:all var(--tr);
  background:linear-gradient(135deg,rgba(242,196,206,.06),rgba(168,212,224,.06))}
.upload-zone:hover{border-color:var(--sage-lt);background:linear-gradient(135deg,rgba(139,175,124,.06),rgba(168,212,224,.08))}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon-wrap{width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,rgba(168,212,160,.25),rgba(168,212,224,.25));
  border:1.5px solid rgba(139,175,124,.3);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.upload-icon-svg{width:20px;height:20px;stroke:var(--sage);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.upload-title{font-size:.9rem;color:var(--charcoal);font-weight:400;margin-bottom:4px}
.upload-subtitle{font-size:.76rem;color:var(--stone-lt);line-height:1.8}

/* ── 제출 버튼 (봄 그린) ── */
.submit-btn{width:100%;padding:17px 24px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--sage-lt),var(--sage-dk));color:white;
  font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:500;
  letter-spacing:.12em;cursor:pointer;transition:all var(--tr);
  box-shadow:0 6px 24px rgba(139,175,124,.35)}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(139,175,124,.45)}
.submit-btn:disabled{background:linear-gradient(135deg,var(--border),var(--stone-lt));
  box-shadow:none;cursor:not-allowed;color:rgba(255,255,255,.7)}

/* ── 푸터 ── */
.footer{text-align:center;padding:28px 0 40px;border-top:1px solid var(--border);
  margin-top:20px;position:relative;z-index:2}
</style>
</head>
<body>

<!-- 배경 -->
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<!-- 꽃잎 -->
<div class="petals-wrap" id="petalsWrap" aria-hidden="true"></div>

<!-- 탭 -->
<nav class="tab-bar">
  <button class="tab-btn active">사진 업로드</button>
  <button class="tab-btn">앨범 보기</button>
  <button class="tab-btn">관리자</button>
</nav>

<div class="page">

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-scene" aria-hidden="true">
      <div class="hs-hill hs-hill-1"></div>
      <div class="hs-hill hs-hill-2"></div>
      <div class="hs-church">
        <svg viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="18" y="52" width="64" height="52" rx="3" fill="#5A8A4E"/>
          <polygon points="8,52 50,16 92,52" fill="#7DAF6E"/>
          <rect x="44" y="4" width="12" height="20" rx="2" fill="white"/>
          <rect x="36" y="11" width="28" height="12" rx="2" fill="white"/>
          <rect x="36" y="76" width="28" height="28" rx="10" fill="rgba(255,255,255,.65)"/>
          <rect x="22" y="60" width="18" height="18" rx="9" fill="rgba(255,255,255,.4)"/>
          <rect x="60" y="60" width="18" height="18" rx="9" fill="rgba(255,255,255,.4)"/>
        </svg>
      </div>
      <div class="hs-cloud" style="width:80px;height:22px;top:20%;left:6%;opacity:.5;animation-duration:4s">
        <span style="position:absolute;width:36px;height:36px;background:white;border-radius:50%;top:-18px;left:10px;display:block"></span>
        <span style="position:absolute;width:26px;height:26px;background:white;border-radius:50%;top:-12px;left:36px;display:block"></span>
      </div>
      <div class="hs-cloud" style="width:60px;height:18px;top:14%;right:10%;opacity:.42;animation-duration:6s;animation-delay:-2s">
        <span style="position:absolute;width:28px;height:28px;background:white;border-radius:50%;top:-14px;left:8px;display:block"></span>
        <span style="position:absolute;width:20px;height:20px;background:white;border-radius:50%;top:-10px;left:28px;display:block"></span>
      </div>
      <div class="hs-spark" style="top:24%;left:20%;background:#F2C4CE;animation-duration:3.2s"></div>
      <div class="hs-spark" style="top:18%;right:25%;background:var(--sky);animation-duration:4.1s;animation-delay:-1.5s"></div>
      <div class="hs-spark" style="top:32%;left:72%;background:var(--sage-lt);animation-duration:3.7s;animation-delay:-.8s"></div>
    </div>

    <!-- 로고 아이콘 -->
    <div class="logo-icon">
      <div class="logo-cross"></div>
      <div class="logo-leaf" style="top:6px;right:6px;transform:rotate(45deg);background:var(--blush)"></div>
      <div class="logo-leaf" style="bottom:6px;left:6px;transform:rotate(225deg);background:var(--sky)"></div>
      <div class="logo-leaf" style="top:6px;left:6px;transform:rotate(-45deg);background:var(--peach)"></div>
    </div>

    <!-- 기존 헤더 텍스트 구조 완전 동일 -->
    <div class="header-ornament">
      <div class="orn-line"></div>
      <span style="color:var(--sage);font-size:.9rem">✦</span>
      <div class="orn-line r"></div>
    </div>
    <h1 class="church-name">광명교회</h1>
    <p class="dept-name">영유아부 · 가정예배</p>
    <p class="theme-text">그리도의 형상을 본받아 살아가는<br><span>작은예배자</span></p>
    <div class="header-divider"></div>
  </header>

  <!-- 기간 배지 -->
  <div class="period-badge">
    <span class="period-dot"></span>
    <span class="period-text">업로드 가능 · 주일 00:00 ~ 토요일 오전 11:00</span>
  </div>

  <!-- Step 1: 반 선택 (기존 구조 동일) -->
  <div class="card">
    <div class="section-num"><div class="num-badge">1</div><span class="num-label">우리 반 선택</span></div>
    <div class="field-group">
      <select class="float-input">
        <option value="">반 선택</option>
        <option>선경나라</option><option>세희나라</option><option>아라나라</option>
        <option>애경나라</option><option>연옥나라</option><option>영실나라</option>
        <option>재신나라</option><option>정일나라</option><option>주영나라</option>
        <option>진영나라</option><option>현진나라</option><option>혜정나라</option><option>혜진나라</option>
      </select>
    </div>
  </div>

  <!-- Step 2: 어린이 이름 (기존 구조 동일) -->
  <div class="card">
    <div class="section-num"><div class="num-badge">2</div><span class="num-label">어린이 이름</span></div>
    <div style="background:rgba(245,239,230,.6);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px">
      <div style="font-size:.72rem;color:var(--stone-lt);letter-spacing:.1em;margin-bottom:10px;font-weight:500">등록된 어린이</div>
      <div class="child-list-wrap">
        <div class="child-chip active">홍길동 <span class="child-chip-del">✕</span></div>
        <div class="child-chip">김민준 <span class="child-chip-del">✕</span></div>
      </div>
    </div>
    <div style="font-size:.72rem;color:var(--stone-lt);margin-bottom:8px;letter-spacing:.08em">새 어린이 추가</div>
    <div class="child-add-row">
      <input class="child-add-input" type="text" placeholder="이름 입력 후 + 추가">
      <button class="child-add-btn">+ 추가</button>
    </div>
    <div class="name-preview-wrap">
      <span class="preview-label-text">선택됨</span>
      <div class="name-pill"><span class="pill-dot"></span><span>홍길동</span></div>
    </div>
  </div>

  <!-- Step 3: 파일 첨부 (기존 구조 동일) -->
  <div class="card">
    <div class="section-num"><div class="num-badge">3</div><span class="num-label">사진 / 영상 첨부</span></div>
    <div class="upload-zone">
      <input type="file" accept="image/*,video/*" multiple>
      <div class="upload-icon-wrap">
        <svg class="upload-icon-svg" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="upload-title">탭하거나 끌어다 놓으세요</p>
      <p class="upload-subtitle">사진 2장 또는 사진 1장 + 영상 1개<br>1장씩 따로 첨부 가능 (최대 2개)<br><span style="color:var(--error);font-size:.7rem">영상은 30MB 이하 권장</span></p>
    </div>
  </div>

  <!-- 제출 버튼 -->
  <div style="margin-top:8px">
    <button class="submit-btn" disabled>업로드 완료하기</button>
  </div>

</div>

<!-- 푸터 (기존 구조 동일) -->
<div class="footer">
  <p style="font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--stone-lt);letter-spacing:.15em;font-weight:400">
    BFW <span style="color:var(--sage);font-weight:500">Little Worshippers</span>
  </p>
</div>

<script>
const wrap = document.getElementById('petalsWrap');
const colors = ['#F2C4CE','#F9D4C0','#FFE8EC','#D4ECC8','#C8E4F0','#FDD9E0'];
for(let i=0;i<20;i++){
  const p=document.createElement('div');
  p.className='petal';
  const s=5+Math.random()*9;
  p.style.cssText=`width:${s}px;height:${s*.8}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${9+Math.random()*11}s;animation-delay:-${Math.random()*16}s;transform:rotate(${Math.random()*360}deg);`;
  wrap.appendChild(p);
}
</script>
</body>
